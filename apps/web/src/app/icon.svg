<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#3b82f6"/>
  <!-- Calendar body -->
  <rect x="6" y="11" width="20" height="15" rx="2.5" fill="white" opacity="0.15"/>
  <rect x="6" y="11" width="20" height="15" rx="2.5" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Header bar -->
  <rect x="6" y="11" width="20" height="5.5" rx="2.5" fill="white" opacity="0.25"/>
  <rect x="6" y="14" width="20" height="2.5" fill="white" opacity="0.25"/>
  <!-- Ring left -->
  <line x1="11" y1="8" x2="11" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Ring right -->
  <line x1="21" y1="8" x2="21" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Day dots -->
  <rect x="10" y="20" width="3" height="3" rx="1" fill="white"/>
  <rect x="14.5" y="20" width="3" height="3" rx="1" fill="white" opacity="0.7"/>
  <rect x="19" y="20" width="3" height="3" rx="1" fill="white" opacity="0.5"/>
</svg>
