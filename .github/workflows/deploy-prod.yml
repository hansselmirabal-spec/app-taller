name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: hansselmirabal-spec

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod-${{ github.sha }}

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://53.103.13.238:8002/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod-${{ github.sha }}

  deploy:
    name: Deploy to PROD server
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pull and restart PROD
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/stacks/app-taller
            docker compose -f docker-compose.portainer.yml --project-name app-taller pull
            docker compose -f docker-compose.portainer.yml --project-name app-taller up -d
            docker image prune -f

      - name: Health check PROD
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              echo "Attempt $i/12..."
              if curl -sf http://localhost:8002/api/v1/health; then
                echo "PROD healthy!"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed after 60s"
            exit 1
