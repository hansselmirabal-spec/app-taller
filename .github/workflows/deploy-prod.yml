name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: hansselmirabal-spec

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod-${{ github.sha }}

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://53.103.13.238:8002/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod
            ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod-${{ github.sha }}

  deploy:
    name: Deploy to PROD server
    needs: [build-api, build-web]
    runs-on: [self-hosted, app-taller-server]
    environment: production
    steps:
      - name: Record previously-deployed SHA (for rollback)
        run: |
          cd /opt/stacks/app-taller
          if [ -f .last-good-sha ]; then
            echo "PREV_SHA=$(cat .last-good-sha)" >> "$GITHUB_ENV"
          else
            echo "PREV_SHA=" >> "$GITHUB_ENV"
          fi

      - name: Pull and restart PROD
        run: |
          cd /opt/stacks/app-taller
          docker compose -f docker-compose.portainer.yml --project-name app-taller pull
          docker compose -f docker-compose.portainer.yml --project-name app-taller up -d
          docker image prune -f

      - name: Health check PROD
        id: health
        run: |
          for i in $(seq 1 12); do
            echo "Attempt $i/12..."
            if curl -sf http://53.103.13.238:8002/api/v1/health; then
              echo "PROD healthy!"
              echo "${{ github.sha }}" > /opt/stacks/app-taller/.last-good-sha
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Rollback to previous known-good version
        if: failure() && steps.health.outcome == 'failure'
        run: |
          cd /opt/stacks/app-taller
          if [ -z "$PREV_SHA" ]; then
            echo "[ALERT] No previous known-good SHA recorded — cannot auto-rollback. PROD is on a failing deploy, manual intervention required NOW."
            exit 1
          fi
          echo "Rolling back to $PREV_SHA..."
          docker tag ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod-$PREV_SHA ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-api:prod
          docker tag ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod-$PREV_SHA ${{ env.REGISTRY }}/${{ env.ORG }}/app-taller-web:prod
          docker compose -f docker-compose.portainer.yml --project-name app-taller up -d --no-build
          for i in $(seq 1 12); do
            if curl -sf http://53.103.13.238:8002/api/v1/health; then
              echo "Rollback successful — PROD healthy again on previous SHA $PREV_SHA"
              exit 0
            fi
            sleep 5
          done
          echo "[ALERT] Rollback health check also failed — PROD may be down. Manual intervention required immediately."
          exit 1
